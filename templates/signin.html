<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <title>Sign In - Electronic Gadget Addiction Prediction</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap core CSS -->
    <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">


    <!-- Additional CSS Files -->
    <link rel="stylesheet" href="../static/assets/css/fontawesome.css">
    <link rel="stylesheet" href="../static/assets/css/templatemo-villa-agency.css">
    <link rel="stylesheet" href="../static/assets/css/owl.css">
    <link rel="stylesheet" href="../static/assets/css/animate.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Graphs page specific styles (kept for consistent theme) -->
    <link rel="stylesheet" href="../static/css/graphs.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="../static/css/style-custom.css">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }



        /* Auth Layout Centering */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 100px;
            /* Accounts for fixed header */
            padding-bottom: 50px;
            width: 100%;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .auth-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #f35525, #ff6b35);
            border-radius: 20px 20px 0 0;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header h2 {
            font-weight: 800;
            color: #1e1e1e;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .auth-header p {
            color: #777;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group-text {
            background: #fdfdfd;
            border-right: none;
            color: #f35525;
            padding: 0 15px;
        }

        .form-control {
            border-left: none;
            padding: 12px 15px;
            font-size: 0.95rem;
            border-radius: 0 10px 10px 0 !important;
            background: #fff;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
            background: #fff;
        }

        .btn-auth {
            background: linear-gradient(135deg, #f35525, #ff6b35);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(243, 85, 37, 0.3);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: #666;
        }

        .auth-footer a {
            color: #f35525;
            font-weight: 700;
            text-decoration: none;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <!-- ***** Header Area Start ***** -->
    <header class="header-area header-sticky">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <nav class="main-nav">
                        <!-- ***** Logo Start ***** -->
                        <a href="/home" class="logo">
                            <h1>GadgetAddiction AI</h1>
                        </a>
                        <!-- ***** Logo End ***** -->
                        <!-- ***** Menu Start ***** -->
                        <ul class="nav">
                            <li>
                                <a href="/" class="active">Home</a>
                            </li>

                            <li>
                                <a href="/logon"><i class="fa fa-sign-out"></i> Register</a>
                            </li>
                        </ul>
                        <a class='menu-trigger'>
                            <span>Menu</span>
                        </a>
                        <!-- ***** Menu End ***** -->
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <!-- ***** Header Area End ***** -->

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your wellness journey</p>
            </div>

            {% if message %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-circle me-2"></i> {{ message }}
            </div>
            {% endif %}

            <form action="/signin" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
                        <input type="text" class="form-control" name="user" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-auth">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/logon">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../static/vendor/jquery/jquery.min.js"></script>
    <script src="../static/assets/js/custom.js"></script>
</body>

</html>
